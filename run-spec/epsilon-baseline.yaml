metadata:
  name: epsilon-baseline
  description: |
    Measure pure allocation cost with EpsilonGC (zero collection overhead).
    This establishes the theoretical minimum benchmark score.
    G1GC overhead = gcOverheadPct reported by gc-summary.json.
    EpsilonGC score reveals the maximum potential improvement from optimizing GC.
  labels:
    category: baseline
    workload: ephemeral

run:
  profile: invariant
  runsDir: runs/

jmh:
  warmupIterations: 5
  measurementIterations: 5
  forks: 3
  threads: 1

benchmarks:

  - id: epsilon-ephemeral
    description: "EphemeralKernel under EpsilonGC (theoretical minimum, zero GC overhead)"
    source:
      type: internal
      module: benchmark-ephemeral-jmh
    jvm:
      args:
        - -XX:+UnlockExperimentalVMOptions
        - -XX:+UseEpsilonGC
        - -Xms2g
        - -Xmx2g
    jmh:
      includes: ".*ephemeralKernelChecksum.*"
    params:
      iterations: 10
      batchSize: 80
      payloadBytes: 320
      sleepMs: 0

  - id: g1-ephemeral
    description: "EphemeralKernel under G1GC 384MB (same workload, GC overhead visible)"
    source:
      type: internal
      module: benchmark-ephemeral-jmh
    jvm:
      args:
        - -XX:+UseG1GC
        - -Xms384m
        - -Xmx384m
    jmh:
      includes: ".*ephemeralKernelChecksum.*"
    params:
      iterations: 10
      batchSize: 80
      payloadBytes: 320
      sleepMs: 0
    thresholds:
      gcFullCountMax: 0

compare:
  pairs:
    - id: epsilon-vs-g1
      base: epsilon-ephemeral
      candidate: g1-ephemeral
      description: |
        Compare G1GC overhead vs theoretical minimum.
        REGRESSION if G1 score > epsilon score * 1.5 (GC overhead > 33% of total time)
      metrics:
        - name: jmhScore
          regressionThresholdPct: 50.0
        - name: gcOverheadPct
          regressionThresholdAbsolute: 20
